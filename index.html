<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#171717" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="ポン出し" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>ポン出し Pad</title>
    <link rel="manifest" href="./manifest.json" />
    <link rel="icon" href="./assets/icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles.css" />
    <link rel="stylesheet" href="./auth.css" />
  </head>
  <body class="auth-locked">
    <section class="auth-gate" id="authGate" aria-live="polite">
      <form class="auth-card" id="authForm">
        <p class="eyebrow">Access</p>
        <h2>パスワード入力</h2>
        <p class="auth-copy">購入時に案内されたパスワードを入力してください。</p>
        <label class="field">
          <span>パスワード</span>
          <input id="authPasswordInput" type="password" autocomplete="current-password" inputmode="text" />
        </label>
        <button class="primary-button full" type="submit">アプリを開く</button>
        <p class="auth-message" id="authMessage"></p>
      </form>
    </section>

    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Soundboard</p>
          <h1>ポン出し Pad</h1>
        </div>
        <button class="icon-button" id="settingsButton" type="button" aria-label="設定">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z" />
            <path d="M19.4 15a1.8 1.8 0 0 0 .36 1.98l.04.04a2 2 0 1 1-2.83 2.83l-.04-.04a1.8 1.8 0 0 0-1.98-.36 1.8 1.8 0 0 0-1.1 1.65V21a2 2 0 1 1-4 0v-.06a1.8 1.8 0 0 0-1.1-1.65 1.8 1.8 0 0 0-1.98.36l-.04.04a2 2 0 1 1-2.83-2.83l.04-.04A1.8 1.8 0 0 0 4.6 15a1.8 1.8 0 0 0-1.65-1.1H3a2 2 0 1 1 0-4h.06a1.8 1.8 0 0 0 1.65-1.1 1.8 1.8 0 0 0-.36-1.98l-.04-.04a2 2 0 1 1 2.83-2.83l.04.04a1.8 1.8 0 0 0 1.98.36 1.8 1.8 0 0 0 1.1-1.65V3a2 2 0 1 1 4 0v.06a1.8 1.8 0 0 0 1.1 1.65 1.8 1.8 0 0 0 1.98-.36l.04-.04a2 2 0 1 1 2.83 2.83l-.04.04a1.8 1.8 0 0 0-.36 1.98 1.8 1.8 0 0 0 1.65 1.1H21a2 2 0 1 1 0 4h-.06A1.8 1.8 0 0 0 19.4 15Z" />
          </svg>
        </button>
      </header>

      <main>
        <section class="transport" aria-label="再生操作">
          <button class="transport-button stop" id="stopAllButton" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 7h10v10H7z" /></svg>
            全停止
          </button>
          <button class="transport-button pause" id="pauseAllButton" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5h3v14H8zM13 5h3v14h-3z" /></svg>
            <span id="pauseAllText">一時停止</span>
          </button>
          <button class="transport-button fade" id="fadeAllButton" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7h5v10H4zM11 9h4v8h-4zM17 12h3v5h-3z" /></svg>
            フェード
          </button>
        </section>

        <section class="status-strip" aria-live="polite">
          <span id="statusText">5ページ×12個、最大60音源を登録できます</span>
          <span id="activeCount">0 playing</span>
        </section>

        <section class="master-volume" aria-label="全体音量">
          <label for="masterVolumeInput">全体音量</label>
          <input id="masterVolumeInput" type="range" min="0" max="100" value="100" />
          <output id="masterVolumeOutput">100%</output>
        </section>

        <section class="page-strip" aria-label="ページ切り替え">
          <span id="pageSummary">Page 1 / 5</span>
          <div class="page-tabs" id="pageTabs" role="tablist" aria-label="Padページ"></div>
        </section>

        <section class="pad-grid" id="padGrid" aria-label="サウンドパッド"></section>
      </main>
    </div>

    <dialog class="sheet" id="padDialog">
      <form method="dialog" class="sheet-card" id="padForm">
        <div class="sheet-head">
          <div>
            <p class="eyebrow">Pad edit</p>
            <h2 id="dialogTitle">パッド編集</h2>
          </div>
          <button class="icon-button compact" id="closePadButton" value="cancel" type="button" aria-label="閉じる">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 6 6 18M6 6l12 12" /></svg>
          </button>
        </div>

        <label class="field">
          <span>名前</span>
          <input id="padNameInput" type="text" maxlength="24" autocomplete="off" />
        </label>

        <label class="field">
          <span>音源</span>
          <input id="singleFileInput" type="file" accept="audio/*,.mp3,.wav,.m4a,.aac,.flac,.ogg,.mp4" />
        </label>

        <div class="field">
          <span>再生モード</span>
          <div class="segmented" role="group" aria-label="再生モード">
            <label><input type="radio" name="mode" value="restart" />押すたび先頭</label>
            <label><input type="radio" name="mode" value="overlap" />重ねる</label>
            <label><input type="radio" name="mode" value="loop" />ループ</label>
          </div>
        </div>

        <label class="field inline">
          <span>音量</span>
          <input id="volumeInput" type="range" min="0" max="100" value="100" />
          <output id="volumeOutput">100%</output>
        </label>

        <div class="field">
          <span>色</span>
          <div class="swatches" id="colorSwatches" role="radiogroup" aria-label="パッド色"></div>
        </div>

        <div class="sheet-actions">
          <button class="danger-button" id="deletePadButton" type="button">削除</button>
          <button class="primary-button" id="savePadButton" value="save" type="submit">保存</button>
        </div>
      </form>
    </dialog>

    <dialog class="sheet" id="settingsDialog">
      <form method="dialog" class="sheet-card">
        <div class="sheet-head">
          <div>
            <p class="eyebrow">Settings</p>
            <h2>設定</h2>
          </div>
          <button class="icon-button compact" id="closeSettingsButton" value="close" type="button" aria-label="閉じる">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 6 6 18M6 6l12 12" /></svg>
          </button>
        </div>

        <label class="toggle-row">
          <input id="vibrateToggle" type="checkbox" />
          <span>
            <strong>タップ時に振動</strong>
            <small>対応スマホで短く振動します</small>
          </span>
        </label>

        <label class="toggle-row">
          <input id="wakeToggle" type="checkbox" />
          <span>
            <strong>画面をなるべく維持</strong>
            <small>対応ブラウザでスリープを抑えます</small>
          </span>
        </label>

        <button class="danger-button full" id="resetButton" type="button">全パッドを削除</button>
        <button class="danger-button full" id="logoutButton" type="button">この端末の認証を解除</button>
      </form>
    </dialog>

    <template id="padTemplate">
      <article class="pad" data-pad-id="">
        <button class="pad-trigger" type="button">
          <span class="pad-number"></span>
          <span class="pad-name"></span>
          <span class="pad-file"></span>
          <span class="meter" aria-hidden="true"></span>
        </button>
        <button class="pad-menu" type="button" aria-label="パッドを編集">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 6.75a1.75 1.75 0 1 0 0-3.5 1.75 1.75 0 0 0 0 3.5ZM12 13.75a1.75 1.75 0 1 0 0-3.5 1.75 1.75 0 0 0 0 3.5ZM12 20.75a1.75 1.75 0 1 0 0-3.5 1.75 1.75 0 0 0 0 3.5Z" /></svg>
        </button>
      </article>
    </template>

    <script src="./app.js" defer></script>
    <script src="./upload-fix.js" defer></script>
    <script src="./auth.js" defer></script>
  </body>
</html>
